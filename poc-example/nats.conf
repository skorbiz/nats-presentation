# NATS Server Configuration
# Documentation: https://docs.nats.io/running-a-nats-service/configuration

# Server settings
server_name: nats-poc
listen: 0.0.0.0:4222

# JetStream configuration
jetstream {
    # Keep JetStream in memory only for this POC.
    max_memory_store: 32GB
    max_file_store: 0
}

# HTTP monitoring endpoint
http_port: 8222

# MQTT support (native in NATS Server)
mqtt {
    # MQTT server port
    port: 1883
    
    # Enable MQTT-to-NATS subject mapping
    # MQTT topic "orders/created" → NATS subject "orders.created"
    # (forward slashes automatically convert to dots)
}

# WebSocket support (native in NATS Server)
websocket {
    # WebSocket port for browser clients
    port: 8022
    
    # No TLS for local development
    no_tls: true
    
    # Compression
    compression: true
}

# Logging
debug: false
trace: false
logtime: true

# Connection settings
max_connections: 100
max_payload: 100MB
max_pending: 10GB

# Cluster routing port (not used in this POC but good to have)
# cluster {
#     name: nats-cluster
#     listen: 0.0.0.0:6222
# }

